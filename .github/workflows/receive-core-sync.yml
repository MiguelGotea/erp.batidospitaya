name: 📦 Receive PitayaCore Sync

on:
  repository_dispatch:
    types: [ pitayacore-sync ]

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout subdominio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: 📥 Clonación Manual (Iron Sync)
        run: |
          echo "🚀 Clonando PitayaCore de forma fresca para romper caché..."
          git clone --depth 1 https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/PitayaCore.git _pitayacore
          
          # 🔍 Validación de DNI (SHA) del commit
          LOCAL_SHA=$(git -C _pitayacore rev-parse HEAD)
          TARGET_SHA="${{ github.event.client_payload.sha }}"
          
          echo "🆔 SHA Esperado: $TARGET_SHA"
          echo "🆔 SHA Descargado: $LOCAL_SHA"
          
          # Si no coinciden, forzamos el fallo del Action (Rojo)
          if [ "$LOCAL_SHA" != "$TARGET_SHA" ]; then
            echo "❌ ERROR: El servidor de GitHub devolvió una versión obsoleta."
            exit 1
          fi
          echo "✅ SHA validado correctamente."

      - name: 🔄 Aplicar cambios al núcleo
        run: |
          rsync -av --delete _pitayacore/core/   ./core/
          rsync -av --delete _pitayacore/docs/   ./docs/
          rsync -av --delete _pitayacore/.agent/ ./.agent/
          rm -rf _pitayacore

      - name: 💾 Guardar cambios en GitHub
        run: |
          git config user.name "PitayaCore Bot"
          git config user.email "bot@batidospitaya.com"
          git add core/ docs/ .agent/

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos que commitear"
          else
            git commit -m "chore(core): sync from PitayaCore@${{ github.event.client_payload.sha }}"
            git push
            echo "✅ 3 carpetas sincronizadas en el repo"
          fi

      - name: 🔑 Configurar SSH para deploy al host
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: 📤 Deploy core/ → HOST
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            ./core/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/core/

      - name: ✅ Finalizado
        run: |
          echo "✅ Sincronización de Hierro completada exitosamente."
