name: Receive PitayaCore Sync

on:
  repository_dispatch:
    types: [ pitayacore-sync ]

concurrency:
  group: sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout subdomain
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Iron Sync Implementation (Retry Loop)
        run: |
          TARGET_SHA="${{ github.event.client_payload.sha }}"
          ATTEMPTS=0
          MAX_ATTEMPTS=5
          SUCCESS=false
          echo "🚀 Iniciando Iron Sync para la versión: $TARGET_SHA"
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            ATTEMPTS=$((ATTEMPTS+1))
            echo "------------------------------------------------------"
            echo "🔄 Intento $ATTEMPTS/$MAX_ATTEMPTS: Descargando PitayaCore..."
            rm -rf _pitayacore
            git clone --depth 1 https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/PitayaCore.git _pitayacore
            LOCAL_SHA=$(git -C _pitayacore rev-parse HEAD)
            if [ "$LOCAL_SHA" == "$TARGET_SHA" ]; then
              echo "✅ SHA validado."
              SUCCESS=true; break
            fi
            echo "⚠️ Versión no coincide. Reintentando en 10s..."
            sleep 10
          done

      - name: Apply changes to Core
        run: |
          rsync -av --delete _pitayacore/core/   ./core/
          rsync -av --delete _pitayacore/docs/   ./docs/
          rsync -av --delete _pitayacore/.agent/ ./.agent/
          rm -rf _pitayacore

      - name: Save changes to GitHub
        run: |
          git config user.name "PitayaCore Bot"
          git config user.email "bot@batidospitaya.com"
          git add core/ docs/ .agent/
          if ! git diff --staged --quiet; then
            git commit -m "chore(core): sync from PitayaCore@${{ github.event.client_payload.sha }}"
            git pull --rebase origin main
            git push
          fi

      - name: Setup SSH for Hostinger
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy core to Host
        run: |
          DEST_USER="${{ secrets.HOSTINGER_USER }}"
          DEST_HOST="${{ secrets.HOSTINGER_HOST }}"
          DEST_PATH="${{ secrets.HOSTINGER_PATH }}${{ secrets.HOSTINGER_PATH_API }}${{ secrets.HOSTINGER_PATH_ERP }}${{ secrets.HOSTINGER_PATH_TALENTO }}"
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -p 65002" ./core/ $DEST_USER@$DEST_HOST:$DEST_PATH/core/
