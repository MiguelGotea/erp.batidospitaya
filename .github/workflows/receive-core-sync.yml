name: ًں“¦ Receive PitayaCore Sync

on:
  repository_dispatch:
    types: [ pitayacore-sync ]

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ًں“¥ Checkout subdominio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: ًں“¥ Clonaciأ³n Manual (Iron Sync con Reintentos)
        run: |
          TARGET_SHA="${{ github.event.client_payload.sha }}"
          ATTEMPTS=0
          MAX_ATTEMPTS=5
          SUCCESS=false
          
          echo "ًںڑ€ Iniciando Iron Sync para la versiأ³n: $TARGET_SHA"
          
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            ATTEMPTS=$((ATTEMPTS+1))
            echo "------------------------------------------------------"
            echo "ًں”„ Intento $ATTEMPTS/$MAX_ATTEMPTS: Descargando PitayaCore..."
            
            rm -rf _pitayacore
            git clone --depth 1 https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/PitayaCore.git _pitayacore
            
            LOCAL_SHA=$(git -C _pitayacore rev-parse HEAD)
            echo "ًں†” SHA Esperado:  $TARGET_SHA"
            echo "ًں†” SHA Descargado: $LOCAL_SHA"
            
            if [ "$LOCAL_SHA" == "$TARGET_SHA" ]; then
              echo "âœ… آ،SHA validado correctamente! Procediendo..."
              SUCCESS=true
              break
            fi
            
            echo "âڑ ï¸ڈ ADVERTENCIA: Versiأ³n obsoleta detectada (Rezagado de GitHub)."
            echo "ًںک´ Esperando 10 segundos antes del prأ³ximo intento..."
            sleep 10
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "â‌Œ ERROR: Agotados los reintentos ($MAX_ATTEMPTS). GitHub sigue devolviendo una versiأ³n vieja."
            echo "â‌Œ La sincronizaciأ³n fallarأ، para proteger la integridad del cأ³digo."
            exit 1
          fi

      - name: ًں”„ Aplicar cambios al nأ؛cleo
        run: |
          rsync -av --delete _pitayacore/core/   ./core/
          rsync -av --delete _pitayacore/docs/   ./docs/
          rsync -av --delete _pitayacore/.agent/ ./.agent/
          rm -rf _pitayacore

      - name: ًں’¾ Guardar cambios en GitHub
        run: |
          git config user.name "PitayaCore Bot"
          git config user.email "bot@batidospitaya.com"
          git add core/ docs/ .agent/

          if git diff --staged --quiet; then
            echo "â„¹ï¸ڈ Sin cambios nuevos que commitear"
          else
            git commit -m "chore(core): sync from PitayaCore@${{ github.event.client_payload.sha }}"
            git push
            echo "âœ… 3 carpetas sincronizadas en el repo"
          fi

      - name: ??? Validar Credenciales de Hostinger
        run: |
          if [ -z "${{ secrets.HOSTINGER_PATH }}" ]; then echo '? ERROR: HOSTINGER_PATH no estل definido en este repo.'; exit 1; fi
          if [ -z "${{ secrets.HOSTINGER_USER }}" ]; then echo '? ERROR: HOSTINGER_USER no estل definido en este repo.'; exit 1; fi
          if [ -z "${{ secrets.HOSTINGER_HOST }}" ]; then echo '? ERROR: HOSTINGER_HOST no estل definido en este repo.'; exit 1; fi
          echo '? Credenciales detectadas.'
      - name: ًں”‘ Configurar SSH para deploy al host
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: ًں“¤ Deploy core/ â†’ HOST
        run: |
          DEST_USER="${{ secrets.HOSTINGER_USER }}"
          DEST_HOST="${{ secrets.HOSTINGER_HOST }}"
          DEST_PATH="${{ secrets.HOSTINGER_PATH }}"
          
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            ./core/ \
            $DEST_USER@$DEST_HOST:$DEST_PATH/core/

      - name: âœ… Finalizado
        run: |
          echo "âœ… Sincronizaciأ³n de Hierro con Reintentos completada exitosamente."
