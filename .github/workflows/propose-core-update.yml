# VersiÃ³n 8.1 con Scanner Auditivo
name: ⬆️ Propose Core Update → PitayaCore

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'

jobs:
  propose:
    if: "!contains(github.event.head_commit.message, 'chore(core): sync')"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 2. Clonación Manual PitayaCore
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/PitayaCore.git _pitayacore

      - name: 🔍 3. Auditoría Quirúrgica (v8.1)
        run: |
          rsync -av --delete ./core/   _pitayacore/core/
          rsync -av --delete ./docs/   _pitayacore/docs/
          rsync -av --delete .agent/   _pitayacore/.agent/
          cd _pitayacore
          git config user.name "Proposer Bot"
          git config user.email "bot@batidospitaya.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "feat(core): update from subdomain (Human Push) - v8.1"
            git push origin main
          else
            # Forzado por si Git estÃ¡ perezoso con los finales de lÃ­nea
            echo " " >> core/testcync.md
            git add .
            git commit -m "feat(core): forced update v8.1"
            git push origin main
          fi
