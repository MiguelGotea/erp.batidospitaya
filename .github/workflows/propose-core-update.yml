name: ⬆️ Propose Core Update → PitayaCore

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'

jobs:
  propose:
    if: "!contains(github.event.head_commit.message, 'chore(core): sync')"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 2. Clonación Manual PitayaCore
        run: |
          echo "🔄 Clonando PitayaCore..."
          git clone --depth 1 https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/PitayaCore.git _pitayacore

      - name: 🔍 3. Auditoría Quirúrgica (v8)
        run: |
          FILE_PATH="core/testcync.md"
          
          echo "📂 INSPECCIÓN PRE-SINCRONIZACIÓN"
          echo "------------------------------------------------"
          echo "📍 API Local ($FILE_PATH):"
          cat $FILE_PATH || echo "Archivo no existe en local"
          
          echo "📍 PitayaCore Remoto (_pitayacore/$FILE_PATH):"
          cat _pitayacore/$FILE_PATH || echo "Archivo no existe en remoto"
          
          echo "------------------------------------------------"
          echo "🛠️ Ejecutando rsync..."
          rsync -av --delete ./core/   _pitayacore/core/
          rsync -av --delete ./docs/   _pitayacore/docs/
          rsync -av --delete .agent/   _pitayacore/.agent/
          
          echo "📍 PitayaCore TRAS RSYNC (_pitayacore/$FILE_PATH):"
          cat _pitayacore/$FILE_PATH
          
          cd _pitayacore
          git config user.name "Proposer Bot"
          git config user.email "bot@batidospitaya.com"
          git add .
          
          echo "🧐 Estado de Git en PitayaCore:"
          git status
          
          if ! git diff --staged --quiet; then
            echo "📝 ¡Cambios detectados! Subiendo a PitayaCore..."
            git commit -m "feat(core): update from subdomain (Human Push) - v8 Audit"
            git push origin main
            echo "✅ ¡Propagación enviada!"
          else
            echo "⚠️ ADVERTENCIA: Git no detecta cambios a pesar del rsync."
            # Forzamos un cambio invisible para ver si es problema de Git
            echo " " >> $FILE_PATH
            git add .
            git commit -m "feat(core): force update due to git detection delay"
            git push origin main
            echo "🦾 Actualización forzada enviada."
          fi
