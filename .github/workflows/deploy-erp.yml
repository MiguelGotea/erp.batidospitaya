name: 🚀 Deploy ERP - 17 Módulos

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 🔑 Configurar SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
        
    - name: 📤 Sincronizar Módulos ERP
      run: |
        # Definir lista de módulos
        MODULES=(
          "atencioncliente"
          "auxiliaradministrativo"
          "cds"
          "desarrollo"
          "diseno"
          "experienciadigital"
          "gerencia"
          "compras"
          "infraestructura"
          "legal"
          "mantenimiento"
          "marketing"
          "produccion"
          "rh"
          "sistemas"
          "sucursales"
          "tecnicodesarrollohumano"
          "ventas"
        )
        
        for MODULE in "${MODULES[@]}"; do
          if [ -d "./modulos/$MODULE" ]; then
            echo "🔄 Sincronizando modulos/$MODULE/"
            
            # Crear la carpeta si no existe (incluyendo uploads)
            ssh -o StrictHostKeyChecking=no -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
              "mkdir -p ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE && \
               mkdir -p ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/uploads"
            
            # Sincronizar la carpeta excluyendo uploads
            rsync -avz \
              --delete \
              --exclude='uploads/' \
              --exclude='.gitignore' \
              --exclude='.agent/' \
              --exclude='core/' \
              --exclude='.scripts/' \
              --exclude='docs/' \
              -e "ssh -o StrictHostKeyChecking=no -p 65002" \
              ./modulos/$MODULE/ \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/
          else
            echo "⚠️ Saltando modulos/$MODULE/ (no existe localmente)"
          fi
        done
        
    - name: 📤 Sincronizar README raíz
      run: |
        echo "🔄 Sincronizando README.md..."
        rsync -avz \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./README.md \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/
          
    - name: 🔧 Configurar permisos
      run: |
        # Definir lista de módulos de nuevo para el paso de permisos
        MODULES=(
          "atencioncliente"
          "auxiliaradministrativo"
          "cds"
          "desarrollo"
          "diseno"
          "experienciadigital"
          "gerencia"
          "compras"
          "infraestructura"
          "legal"
          "mantenimiento"
          "marketing"
          "produccion"
          "rh"
          "sistemas"
          "sucursales"
          "tecnicodesarrollohumano"
          "ventas"
        )
        
        for MODULE in "${MODULES[@]}"; do
          if [ -d "./modulos/$MODULE" ]; then
            echo "🔧 Configurando permisos para modulos/$MODULE/"
            ssh -o StrictHostKeyChecking=no -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
              "chmod -R 755 ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/ && \
               find ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/ -type f -exec chmod 644 {} \; && \
               chmod -R 755 ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/uploads/ && \
               chmod -R 777 ${{ secrets.HOSTINGER_PATH }}/modulos/$MODULE/uploads/ || true"
          else
            echo "⚠️ Saltando permisos para modulos/$MODULE/ (no existe localmente)"
          fi
        done
        
    - name: ✅ Verificar deploy
      run: |
        echo "✅ Deploy completado para los 17 módulos"
        echo "📁 Carpetas 'uploads' excluidas del sync"
        echo "🌐 Sitio: https://erp.batidospitaya.com"
        echo "🖥️ Servidor: ${{ secrets.HOSTINGER_HOST }}:65002"