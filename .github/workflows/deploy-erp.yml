name: 🚀 Deploy ERP - Todos los Módulos

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 🔑 Configurar SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

    - name: 📤 Sincronizar Módulos ERP (Todos)
      run: |
        echo "🔄 Sincronizando modulos/ completo..."
        rsync -avz --delete \
          --exclude='uploads/' \
          --exclude='.gitignore' \
          --exclude='.agent/' \
          --exclude='.scripts/' \
          --exclude='supervision/auditorias_original/fotos/' \
          --exclude='supervision/auditorias_original/fotoslimpieza/' \
          --exclude='supervision/auditorias_original/fotospersonal/' \
          --exclude='supervision/auditorias_original/fotosservicio/' \
          --exclude='supervision/auditorias_original/auditinternas/fotos_auditorias_caja_chica/' \
          --exclude='supervision/auditorias_original/auditinternas/fotos_auditorias_caja_facturacion/' \
          --exclude='supervision/auditorias_original/auditinternas/fotos_auditorias_inventario/' \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./modulos/ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/modulos/
        # NOTA: Los --exclude de fotos son críticos porque rsync usa --delete.
        # Sin ellos, rsync borraría esas carpetas del host al no encontrarlas
        # en el repo de Git (están excluidas por .gitignore).
        # Eliminar cada línea cuando la carpeta se migre a uploads/ correcta.

    - name: 📤 Sincronizar Core raíz
      run: |
        echo "🔄 Sincronizando core/..."
        rsync -avz --delete \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./core/ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/core/

    - name: 📤 Sincronizar Docs raíz
      run: |
        echo "🔄 Sincronizando docs/..."
        rsync -avz --delete \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./docs/ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/docs/

    - name: 📤 Sincronizar README raíz
      run: |
        echo "🔄 Sincronizando README.md..."
        rsync -avz \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./README.md \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}/

    - name: 🔧 Configurar permisos
      run: |
        echo "🔧 Configurando permisos en modulos/..."
        ssh -o StrictHostKeyChecking=no -p 65002 \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
          "find ${{ secrets.HOSTINGER_PATH }}/modulos/ -type d -exec chmod 755 {} \; && \
           find ${{ secrets.HOSTINGER_PATH }}/modulos/ -type f -exec chmod 644 {} \; && \
           find ${{ secrets.HOSTINGER_PATH }}/modulos/ -type d -name 'uploads' -exec chmod 777 {} \;"

    - name: ✅ Verificar deploy
      run: |
        echo "✅ Deploy completado — todos los módulos + Core + Docs"
        echo "🌐 Sitio: https://erp.batidospitaya.com"
        echo "🖥️ Servidor: ${{ secrets.HOSTINGER_HOST }}:65002"